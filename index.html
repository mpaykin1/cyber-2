<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cyberpunk City + UFO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;}
#ui{position:fixed;top:14px;left:50%;transform:translateX(-50%);color:#f80;font-size:13px;letter-spacing:3px;font-family:"Courier New",monospace;pointer-events:none;text-shadow:0 0 10px #f80,0 0 22px #f40;white-space:nowrap;}
#modebtn{position:fixed;top:14px;right:16px;background:rgba(0,200,255,0.12);border:1px solid rgba(0,200,255,0.4);color:#0cf;font-size:11px;letter-spacing:2px;font-family:"Courier New",monospace;padding:7px 14px;cursor:pointer;border-radius:3px;text-shadow:0 0 6px #0cf;}
#telepbtn{position:fixed;top:54px;right:16px;background:rgba(255,100,0,0.15);border:1px solid rgba(255,150,0,0.5);color:#fa0;font-size:11px;letter-spacing:2px;font-family:"Courier New",monospace;padding:7px 14px;cursor:pointer;border-radius:3px;text-shadow:0 0 6px #fa0;}
#telepbtn.inside{background:rgba(0,255,150,0.15);border-color:rgba(0,255,150,0.5);color:#0fa;text-shadow:0 0 6px #0fa;}
#updownbtns{display:none!important;}
#teleport-flash{position:fixed;inset:0;background:#00ffcc;pointer-events:none;opacity:0;transition:opacity 0.15s;}
#ctrl{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:#0cf;font-size:10px;letter-spacing:1.5px;font-family:"Courier New",monospace;pointer-events:none;opacity:0.45;text-align:center;}
#joyL,#joyR{position:fixed;bottom:80px;width:110px;height:110px;border-radius:50%;background:rgba(0,200,255,0.07);border:1px solid rgba(0,200,255,0.22);display:block;}
#joyL{left:28px;}#joyR{right:28px;}
.knob{position:absolute;width:42px;height:42px;border-radius:50%;background:rgba(0,200,255,0.32);top:50%;left:50%;transform:translate(-50%,-50%);}
.bullet{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:999;box-shadow:0 0 6px currentColor;}
#hud{position:fixed;top:56px;left:16px;display:flex;flex-direction:column;gap:6px;pointer-events:none;font-family:"Courier New",monospace;font-size:10px;letter-spacing:1px;}
.bar-row{display:flex;align-items:center;gap:6px;color:#fff;opacity:0.85;}
.bar-bg{width:90px;height:7px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);}
.bar-fill{height:100%;border-radius:4px;transition:width 0.2s;}
#bar-life{background:#ff2244;}#bar-fuel{background:#00ccff;}#bar-weapon{background:#ffaa00;}
#gameover{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:rgba(0,0,0,0.75);z-index:9999;font-family:"Courier New",monospace;}
#gameover h1{color:#ff2244;font-size:36px;letter-spacing:6px;text-shadow:0 0 24px #ff2244;}
#gameover button{background:rgba(255,34,68,0.2);border:1px solid #ff2244;color:#ff2244;font-size:13px;letter-spacing:3px;padding:10px 28px;cursor:pointer;border-radius:4px;}
</style>
</head>
<body>
<div id="ui">◈ NEON DISTRICT ◈</div>
<div id="hud">
  <div class="bar-row">❤️ <div class="bar-bg"><div class="bar-fill" id="bar-life" style="width:100%"></div></div></div>
  <div class="bar-row">⛽ <div class="bar-bg"><div class="bar-fill" id="bar-fuel" style="width:100%"></div></div></div>
  <div class="bar-row">🔫 <div class="bar-bg"><div class="bar-fill" id="bar-weapon" style="width:60%"></div></div></div>
</div>
<div id="gameover"><h1>GAME OVER</h1><button onclick="restartGame()">▶ RESTART</button></div>
<button id="modebtn" onclick="toggleMode()">🛸 UFO</button>
<button id="telepbtn" onclick="teleportHuman()">⚡ BOARD UFO</button>
<div id="updownbtns"><button id="upbtn">▲</button><button id="dnbtn">▼</button></div>
<div id="teleport-flash"></div>
<div id="ctrl">◀▶ — move | SPACE — jump | T — board UFO</div>
<div id="joyL"><div class="knob" id="knobL"></div></div>
<div id="joyR"><div class="knob" id="knobR"></div></div>

const TILE=16,FR=4;
const floorMap=new Map();
function updateFloor(px,pz){
  const cx=Math.round(px/TILE),cz=Math.round(pz/TILE);
  for(let dx=-FR;dx<=FR;dx++)for(let dz=-FR;dz<=FR;dz++){
    const key=cx+dx+","+cz+dz;
    if(!floorMap.has(key)){const geo=new THREE.PlaneGeometry(TILE,TILE);geo.rotateX(-Math.PI/2);const m=new THREE.Mesh(geo,floorMat);m.position.set((cx+dx)*TILE,0,(cz+dz)*TILE);scene.add(m);floorMap.set(key,m);}
  }
  for(const[k,m]of floorMap){const[kx,kz]=k.split(",").map(Number);if(Math.abs(kx-cx)>FR+1||Math.abs(kz-cz)>FR+1){scene.remove(m);floorMap.delete(k);}}
}

// ── Infinite 3D buildings (foreground, chunk-based along X) ──
const BCHUNK_W  = 14;   // world units per building slot
const B_RANGE   = 20;   // chunks visible each side
const bldgChunks = new Map();

function makeBuildingChunk(ci) {
  if (bldgChunks.has(ci)) return;
  const group = new THREE.Group();

  for (const side of [-1, 1]) {
    const h  = 8 + Math.abs(Math.sin(ci * 7.3 + side)) * 28 + Math.random() * 14;
    const w  = 4 + Math.random() * 3;
    const sc = NC[Math.abs(ci * 3 + side + 2) % NC.length];

    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, 12), wallMat);
    mesh.position.set(side * (6 + w * 0.5), h / 2, 0);
    group.add(mesh);

    // Neon strip
    const strip = new THREE.Mesh(
      new THREE.PlaneGeometry(w + 1, 0.1 + Math.random() * 0.15),
      new THREE.MeshBasicMaterial({ color: sc, transparent: true, opacity: 0.9 })
    );
    strip.position.set(-side * (w * 0.5 + 0.02), -h / 2 + 2 + Math.random() * (h - 4), 0);
    strip.rotation.y = side > 0 ? Math.PI : 0;
    mesh.add(strip);
  }

  group.position.x = ci * BCHUNK_W;
  scene.add(group);
  bldgChunks.set(ci, group);
}

function updateBuildings(px) {
  const cx = Math.round(px / BCHUNK_W);
  for (let d = -B_RANGE; d <= B_RANGE; d++) makeBuildingChunk(cx + d);
  for (const [k, g] of bldgChunks) {
    if (Math.abs(k - cx) > B_RANGE + 2) { scene.remove(g); bldgChunks.delete(k); }
  }
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);const t=clock.elapsedTime;

  // Only LEFT / RIGHT input (and UP for jump / UFO vertical)
  const goRight = keys["KeyD"]||keys["ArrowRight"]||(jS.lx> 0.15);
  const goLeft  = keys["KeyA"]||keys["ArrowLeft"] ||(jS.lx<-0.15);
  const goUp    = keys["KeyW"]||keys["ArrowUp"]   ||keys["Space"]||(jS.ly<-0.15)||(jS.ry<-0.3);
  const goDown  = keys["KeyS"]||keys["ArrowDown"] ||(jS.ly> 0.15)||(jS.ry> 0.3);

  if(mode==="human"){
    // Horizontal movement only
    const dir = goRight ? 1 : goLeft ? -1 : 0;
    if(dir!==0){
      hVel.x = THREE.MathUtils.lerp(hVel.x, dir*6, 0.08);
      cg.rotation.y = dir>0 ? 0 : Math.PI; // face left or right
    } else {
      hVel.x = THREE.MathUtils.lerp(hVel.x, 0, 0.18);
    }
    cg.position.x += hVel.x * dt;
    cg.position.z = 0; // always on the street lane

    // Jump
    if(goUp && onGround){hVel.y=8;onGround=false;}
    hVel.y+=-20*dt;
    cg.position.y+=hVel.y*dt;
    if(cg.position.y<=0){cg.position.y=0;hVel.y=0;onGround=true;}

    // Walk animation
    const spd=Math.abs(hVel.x);
    if(spd>0.3&&onGround){hLL.rotation.x=Math.sin(t*5.5)*0.55;hRL.rotation.x=-Math.sin(t*5.5)*0.55;hLA.rotation.x=-Math.sin(t*5.5)*0.4;hRA.rotation.x=Math.sin(t*5.5)*0.4;}
    else{[hLL,hRL,hLA,hRA].forEach(m=>m.rotation.x*=0.85);}

    // Side camera — fixed Z offset, follows X
    const targetCamX = cg.position.x;
    const targetCamY = cg.position.y + CAM_Y;
    camera.position.lerp(new THREE.Vector3(targetCamX, targetCamY, CAM_Z), 0.1);
    camera.lookAt(cg.position.x, cg.position.y+1.2, 0);

    updateFloor(cg.position.x, 0);

    // UFO patrols horizontally above, drifts ahead
    ufoGroup.position.x = THREE.MathUtils.lerp(ufoGroup.position.x, cg.position.x + 8 + Math.sin(t*0.4)*12, 0.015);
    ufoGroup.position.y = 8 + Math.sin(t*0.9)*1.5;
    ufoGroup.position.z = 2;

  } else {
    // UFO: left/right + up/down only
    const uVx = goRight ? 1 : goLeft ? -1 : 0;
    hVel.x = THREE.MathUtils.lerp(hVel.x, uVx*10, 0.07);
    ufoGroup.position.x += hVel.x * dt;
    ufoGroup.position.z = 2;

    if(goUp)  hVel.y = THREE.MathUtils.lerp(hVel.y,  8, 0.12);
    else if(goDown) hVel.y = THREE.MathUtils.lerp(hVel.y, -6, 0.12);
    else      hVel.y = THREE.MathUtils.lerp(hVel.y,  0, 0.1);
    ufoGroup.position.y += hVel.y * dt;
    // No upper limit — UFO can fly to space. Lower limit only.
    if (ufoGroup.position.y < 3) { ufoGroup.position.y = 3; hVel.y = 0; }

    // Fuel drains while flying
    if (!state.dead) {
      state.fuel = Math.max(0, state.fuel - dt * 0.006);
      if (state.fuel <= 0) { hVel.y = Math.min(hVel.y, -1); } // fall slowly
      updateHUD();
    }

    // Tilt on horizontal move
    ufoGroup.rotation.z = THREE.MathUtils.lerp(ufoGroup.rotation.z, -uVx*0.18, 0.1);

    if(humanInsideUFO) cg.position.set(ufoGroup.position.x, ufoGroup.position.y-0.8, 2);

    // Side camera follows UFO
    camera.position.lerp(new THREE.Vector3(ufoGroup.position.x, ufoGroup.position.y + 2, CAM_Z + 4), 0.1);
    camera.lookAt(ufoGroup.position.x, ufoGroup.position.y, 0);

    updateFloor(ufoGroup.position.x, 0);
  }
  disc.rotation.y+=dt*0.4;rim.rotation.y-=dt*0.6;glowRing.rotation.y+=dt*0.8;
  portLights.forEach(pl=>{const f=0.6+0.4*Math.sin(t*4+pl.phase);pl.light.intensity=2.5*f;});
  engineLight.position.copy(ufoGroup.position).add(new THREE.Vector3(0,-1,0));
  engineLight.intensity=4+Math.sin(t*8)*0.8;
  bGlowMat.opacity=0.25+0.2*Math.sin(t*6);nozzMat.emissiveIntensity=0.8+0.5*Math.sin(t*6);
  const beamOn=(keys["KeyF"])&&mode==="ufo";
  beamT=beamOn?Math.min(1,beamT+dt*2):Math.max(0,beamT-dt*3);
  beamMat.opacity=beamT*0.22;beamSpot.intensity=beamT*12;
  beamSpot.position.copy(ufoGroup.position);beamSpot.target.position.set(ufoGroup.position.x,0,ufoGroup.position.z);
  for(let i=0;i<RC;i++){rPos[i*3+1]-=16*dt;if(rPos[i*3+1]<-1){const ref=mode==="human"?cg.position:ufoGroup.position;rPos[i*3+1]=28+Math.random()*6;rPos[i*3]=ref.x+(Math.random()-0.5)*60;rPos[i*3+2]=ref.z+(Math.random()-0.5)*60;}}
  rGeo.attributes.position.needsUpdate=true;
  // ── Day/night cycle ──
  dayTime = (dayTime + dt / DAY_DURATION) % 1;
  const playerX = mode === 'human' ? cg.position.x : ufoGroup.position.x;

  // Draw sky + 2D bg buildings into offscreen canvas → Three.js background
  const skyState  = drawSky(dayTime, t, playerX);
  const neonBoost = sync3DLighting(skyState);

  // Update infinite 3D foreground buildings
  updateBuildings(playerX);

  neonLights.forEach(n=>{const f=Math.sin(t*5+n.ph)*0.35+0.65+(Math.random()>0.975?-0.5:0);n.l.intensity=Math.max(0.1,3*f*neonBoost);n.l.position.x=n.base.x+(mode==="human"?cg.position.x:ufoGroup.position.x);});

  if (state.dead) { renderer.render(scene,camera); return; }

  // ── Shooting: right stick → neon rays (needs weapon ammo) ──
  shootCooldown -= dt;
  const shootX = jS.rx || (keys['KeyL'] ? 1 : keys['KeyJ'] ? -1 : 0);
  const shootY = jS.ry || (keys['KeyI'] ? -1 : keys['KeyK'] ? 1 : 0);
  if ((Math.abs(shootX) > 0.2 || Math.abs(shootY) > 0.2) && shootCooldown <= 0 && state.weapon > 0) {
    if (AC.state === 'suspended') AC.resume();
    spawnRay(shootX, shootY);
    playShootSound(shootX, shootY);
    shootCooldown = 0.12;
  }

  // ── Move harmonics ──
  const moving = mode === 'human'
    ? (Math.abs(hVel.x) > 1)
    : (Math.abs(hVel.x) > 1 || Math.abs(hVel.y) > 0.5);
  if (moving) {
    lastMoveSound -= dt;
    if (lastMoveSound <= 0) {
      if (AC.state === 'suspended') AC.resume();
      playMoveChord();
      lastMoveSound = 1.8; // slow — cosmic pad feel
    }
  }

  // ── DIFFICULTY ESCALATION ──
  gameTime += dt;
  difficulty = Math.min(1, gameTime / 180);            // ramps 0→1 over 3 min
  const maxDrones   = Math.floor(2 + difficulty * 8);  // 2..10
  const spawnDelay  = Math.max(1.5, 5 - difficulty * 4); // 5s → 1.5s
  const droneSpeed  = 0.25 + difficulty * 0.8;          // faster chase
  const droneAtkRate= Math.max(0.8, 2.5 - difficulty * 2); // more frequent shots

  // Chord progression cycle every 30s
  chordSetTimer += dt;
  if (chordSetTimer >= 30) {
    chordSetTimer = 0;
    const nextSet = (CHORD_SETS.indexOf(CHORD_NOTES) + 1) % CHORD_SETS.length;
    CHORD_NOTES = CHORD_SETS[nextSet];
  }

  // ── Drone spawner ──
  droneSpawnTimer -= dt;
  if (droneSpawnTimer <= 0 && drones.length < maxDrones) {
    spawnDrone();
    droneSpawnTimer = spawnDelay + Math.random() * 2;
  }

  // Voicing grows 2→5 notes as difficulty rises
  voicingSize = 2 + Math.floor(difficulty * 3);

  // ── Update drones ──
  // Target whichever entity is active
  const droneTarget = humanInsideUFO ? ufoGroup : (mode === 'ufo' ? ufoGroup : cg);
  drones.forEach((d, idx) => {
    if (!d.alive) return;
    d.spinY += dt * (1.5 + difficulty * 2);
    d.mesh.rotation.y = d.spinY;
    d.mesh.position.y += Math.sin(t * 2 + d.bobPhase) * dt * 0.8;
    // Chase active target with escalating speed
    d.mesh.position.x += (droneTarget.position.x - d.mesh.position.x) * dt * droneSpeed;
    d.mesh.position.z += (droneTarget.position.z - d.mesh.position.z) * dt * (droneSpeed * 0.8);

    // Drone attacks player
    if (!droneAttackTimer[idx]) droneAttackTimer[idx] = droneAtkRate * Math.random();
    droneAttackTimer[idx] -= dt;
    if (droneAttackTimer[idx] <= 0) {
      droneShoot(d);
      droneAttackTimer[idx] = droneAtkRate + Math.random() * 0.5;
    }
  });

  checkRayDroneCollisions();
  drawRays(dt);
  updateExplosions(dt);

  if (!state.dead) {
    // ── Pickup spawner ──
    pickupSpawnTimer -= dt;
    if (pickupSpawnTimer <= 0 && pickups.length < 18) {
      spawnPickup();
      pickupSpawnTimer = 4 + Math.random() * 4;
    }
    updatePickups(dt, t);

    // ── Weapon ammo drains while shooting ──
    if (Math.abs(jS.rx||0) > 0.2 || Math.abs(jS.ry||0) > 0.2) {
      state.weapon = Math.max(0, state.weapon - dt * 0.04);
      updateHUD();
    }

    // ── Drone ray hits player ──
    rays.forEach(r => {
      if (!r.isDroneShot) return;
      // Check hit vs human
      const hvec = cg.position.clone().project(camera);
      const hsx  = (hvec.x*0.5+0.5)*rayCanvas.width;
      const hsy  = (-hvec.y*0.5+0.5)*rayCanvas.height;
      if (Math.hypot(r.x-hsx,r.y-hsy) < 28 && cg.visible) {
        state.life = Math.max(0, state.life - 0.04);
        r.life = 0; updateHUD();
      }
      // Check hit vs UFO
      const uvec = ufoGroup.position.clone().project(camera);
      const usx  = (uvec.x*0.5+0.5)*rayCanvas.width;
      const usy  = (-uvec.y*0.5+0.5)*rayCanvas.height;
      if (Math.hypot(r.x-usx,r.y-usy) < 40) {
        state.life = Math.max(0, state.life - 0.03);
        r.life = 0; updateHUD();
      }
    });

    // ── Game over check ──
    if (state.life <= 0) triggerGameOver();

    // ── Death animation ──
  } else {
    cg.position.y += hVel.y * dt;
    hVel.y -= 12 * dt;
    if (cg.position.y < -5) cg.position.y = -5;
  }

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════
//  SKY — offscreen canvas → Three.js texture
//  Each function has ONE job.
// ═══════════════════════════════════════════

// Offscreen canvas for sky — never touches DOM
const skyOff = document.createElement('canvas');
skyOff.width  = 512;
skyOff.height = 256;
const skyCtx = skyOff.getContext('2d');
const skyTex = new THREE.CanvasTexture(skyOff);
scene.background = skyTex;   // replaces solid colour background

// ── Data: derive sky state from dayTime (0..1) ──
// dayTime: 0=midnight  0.25=sunrise  0.5=noon  0.75=sunset
function getSkyState(dayTime) {
  const angle  = dayTime * Math.PI * 2;
  const sinH   = Math.sin(angle - Math.PI / 2); // -1 night → +1 noon
  const isDay  = sinH > -0.15;
  const horizon = Math.max(0, 1 - Math.abs(sinH)); // peak at sunrise/set

  // Sun position in offscreen canvas coords
  const W = skyOff.width, H = skyOff.height;
  const sunX = W / 2 + Math.cos(angle - Math.PI / 2) * W * 0.38;
  const sunY = H * 0.65 - Math.max(0, sinH) * H * 0.58;

  return { sinH, isDay, horizon, sunX, sunY, W, H };
}

// ── Sky gradient ──
function drawSkyGradient(s) {
  const { sinH, isDay, horizon, W, H } = s;
  const d = Math.max(0, sinH); // 0=night → 1=noon

  const topCol = isDay
    ? `rgb(${5  + d*20 + horizon*30},${10 + d*50},${40 + d*115})`
    : 'rgb(2,2,12)';
  const botCol = isDay
    ? `rgb(${15 + d*50 + horizon*100},${15 + d*50 + horizon*20},${50 + d*90})`
    : 'rgb(6,4,18)';

  const g = skyCtx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, topCol);
  g.addColorStop(1, botCol);
  skyCtx.fillStyle = g;
  skyCtx.fillRect(0, 0, W, H);
}

// ── Stars (night only) ──
function drawStars(s) {
  const alpha = Math.max(0, -s.sinH * 1.3);
  if (alpha <= 0) return;

  skyCtx.save();
  skyCtx.globalAlpha = alpha;
  skyCtx.fillStyle = '#fff';
  for (let i = 0; i < 120; i++) {
    const px = ((i * 137.5) % 1) * s.W;
    const py = ((i *  97.3) % 1) * s.H * 0.75;
    const r  = i % 4 === 0 ? 1.4 : 0.7;
    skyCtx.beginPath();
    skyCtx.arc(px, py, r, 0, Math.PI * 2);
    skyCtx.fill();
  }
  skyCtx.restore();
}

// ── Sun glow halo ──
function drawSunGlow(s) {
  if (!s.isDay) return;
  const { sunX, sunY, sinH, horizon, W, H } = s;
  const d     = Math.max(0, sinH);
  const size  = 55 + horizon * 35;
  const alpha = Math.min(0.6, d * 0.5 + horizon * 0.5);
  const gR = 255, gG = Math.round(140 + d * 80), gB = Math.round(d * 50);

  const g = skyCtx.createRadialGradient(sunX, sunY, 0, sunX, sunY, size);
  g.addColorStop(0,   `rgba(${gR},${gG},${gB},${alpha})`);
  g.addColorStop(0.5, `rgba(${gR},${gG - 40},0,${alpha * 0.35})`);
  g.addColorStop(1,   'rgba(0,0,0,0)');
  skyCtx.fillStyle = g;
  skyCtx.fillRect(0, 0, W, H);
}

// ── Sun disc ──
function drawSunDisc(s) {
  if (!s.isDay) return;
  const { sunX, sunY, sinH, horizon } = s;
  const d  = Math.max(0, sinH);
  const r  = 255;
  const g2 = Math.round(180 + d * 65);
  const b  = Math.round(d * 70);

  skyCtx.save();
  skyCtx.shadowColor = `rgb(${r},${g2},${b})`;
  skyCtx.shadowBlur  = 14 + horizon * 10;
  skyCtx.fillStyle   = `rgb(${r},${g2},${b})`;
  skyCtx.beginPath();
  skyCtx.arc(sunX, sunY, 12 + horizon * 4, 0, Math.PI * 2);
  skyCtx.fill();
  skyCtx.restore();
}

// ── Clouds ──
const CLOUD_DEFS = [
  { bx: 0.10, by: 0.22, rw: 0.18, rh: 0.10 },
  { bx: 0.40, by: 0.14, rw: 0.22, rh: 0.12 },
  { bx: 0.65, by: 0.26, rw: 0.15, rh: 0.09 },
  { bx: 0.82, by: 0.16, rw: 0.20, rh: 0.11 },
];

function drawClouds(s, t) {
  const { sinH, isDay, horizon, W, H } = s;
  const alpha = isDay ? Math.min(0.88, 0.25 + Math.max(0, sinH) * 0.75) : 0.06;
  if (alpha < 0.01) return;

  const d  = Math.max(0, sinH);
  const cR = Math.round(215 + horizon * 40);
  const cG = Math.round(200 + horizon * 5);
  const cB = Math.round(195 - horizon * 70);

  skyCtx.save();
  CLOUD_DEFS.forEach((c, i) => {
    // Slow horizontal drift unique per cloud
    const drift = (c.bx + t * (0.000015 + i * 0.000008)) % 1.0;
    const cx = drift * W;
    const cy = c.by * H;
    const rw = c.rw * W;
    const rh = c.rh * H;

    // Soft cloud: 3 overlapping ellipses per cloud puff
    [0, -rw * 0.3, rw * 0.3].forEach((dx, j) => {
      const g = skyCtx.createRadialGradient(cx + dx, cy, 0, cx + dx, cy, rw * 0.5);
      g.addColorStop(0,   `rgba(${cR},${cG},${cB},${alpha})`);
      g.addColorStop(0.6, `rgba(${cR},${cG},${cB},${alpha * 0.5})`);
      g.addColorStop(1,   'rgba(0,0,0,0)');
      skyCtx.fillStyle = g;
      skyCtx.beginPath();
      skyCtx.ellipse(cx + dx, cy - j * rh * 0.1, rw * 0.5, rh * 0.5, 0, 0, Math.PI * 2);
      skyCtx.fill();
    });
  });
  skyCtx.restore();
}

// ── Horizon warm strip at sunrise/sunset ──
function drawHorizonGlow(s) {
  const { horizon, sinH, isDay, W, H } = s;
  if (!isDay || horizon < 0.05) return;

  const r = 255, g2 = Math.round(90 + Math.max(0,sinH) * 60), b = 0;
  const g = skyCtx.createLinearGradient(0, H * 0.6, 0, H);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, `rgba(${r},${g2},${b},${horizon * 0.4})`);
  skyCtx.fillStyle = g;
  skyCtx.fillRect(0, H * 0.6, W, H * 0.4);
}

// ── 2D background buildings (drawn into sky texture) ──
// Deterministic height from slot index — no random per frame
function bg2dBuildingHeight(slot) {
  return 30 + Math.abs(Math.sin(slot * 2.399)) * 60 + Math.abs(Math.cos(slot * 1.618)) * 30;
}

function drawBgBuildings(playerX, dayState) {
  const { sinH, W, H } = dayState;
  const groundY = H * 0.82;
  const SLOT_W  = 18;   // px per building slot in sky texture
  const COLS_FAR  = ['#0a1520','#0d1a28','#081018','#0c1822'];
  const COLS_MID  = ['#101e30','#142235','#0e1a28'];

  // Two parallax layers: far (slow) and mid (faster)
  [[0.004, 0.55, COLS_FAR, 0.7], [0.008, 0.72, COLS_MID, 0.85]].forEach(([speed, scale, cols, opacity]) => {
    const offset = (playerX * speed) % SLOT_W;
    const count  = Math.ceil(W / SLOT_W) + 2;
    const startSlot = Math.floor(playerX * speed / SLOT_W) - 1;

    skyCtx.globalAlpha = opacity;
    for (let i = 0; i < count; i++) {
      const slot = startSlot + i;
      const bh   = bg2dBuildingHeight(slot) * scale;
      const bw   = SLOT_W - 2;
      const bx   = i * SLOT_W - offset;
      const by   = groundY - bh;

      // Building body
      skyCtx.fillStyle = cols[Math.abs(slot) % cols.length];
      skyCtx.fillRect(bx, by, bw, bh);

      // Neon window dots
      const nCol = NC[Math.abs(slot) % NC.length];
      skyCtx.fillStyle = `rgba(${(nCol>>16)&255},${(nCol>>8)&255},${nCol&255},0.7)`;
      for (let wy = by + 4; wy < groundY - 4; wy += 7) {
        for (let wx = bx + 3; wx < bx + bw - 3; wx += 6) {
          if ((Math.abs(slot * 13 + Math.floor(wy) * 7 + Math.floor(wx) * 3)) % 3 === 0) {
            skyCtx.fillRect(wx, wy, 2, 3);
          }
        }
      }

      // Rooftop neon strip
      skyCtx.fillStyle = `rgba(${(nCol>>16)&255},${(nCol>>8)&255},${nCol&255},0.9)`;
      skyCtx.fillRect(bx, by, bw, 1.5);
    }
  });

  skyCtx.globalAlpha = 1;
}

// ── Master: draw all sky layers, upload to GPU ──
function drawSky(dayTime, t, playerX) {
  const s = getSkyState(dayTime);
  drawSkyGradient(s);
  drawStars(s);
  drawSunGlow(s);
  drawSunDisc(s);
  drawClouds(s, t);
  drawHorizonGlow(s);
  drawBgBuildings(playerX, s);  // 2D buildings on top of sky
  skyTex.needsUpdate = true;
  return s;
}

// ═══════════════════════════════════════════
//  3D lighting sync — same sky state, one job
// ═══════════════════════════════════════════
function sync3DLighting(s) {
  const { sinH, horizon } = s;
  const day   = Math.max(0,  sinH);
  const night = Math.max(0, -sinH);

  ambLight.intensity = 1.5 + day * 3.5;
  ambLight.color.setRGB(0.02 + day*0.18, 0.02 + day*0.14, 0.04 + day*0.08 + night*0.06);

  hemiLight.intensity = 0.4 + day * 1.2;
  hemiLight.color.setRGB(day*0.3 + horizon*0.4, 0.04 + day*0.25, 0.1 + day*0.1);
  hemiLight.groundColor.setRGB(0.02 + day*0.08, 0.01 + day*0.05, 0.02);

  sunLight.intensity = day * 2.2;
  sunLight.color.setRGB(1, 0.7 + day*0.3, day*0.7);

  // Fog matches sky bottom colour
  scene.fog.color.setRGB(0.004 + day*0.05 + horizon*0.1, 0.008 + day*0.04, 0.032 + day*0.06 + night*0.04);

  return 0.6 + night * 1.8; // neonBoost
}

// ══════════════════════════════════════════════════════════
//  AUDIO — harmonics on move, shoot sounds match chords
// ══════════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();

// Cm pentatonic chord — Cm, Eb, G, Bb, F
// ── CHORD PROGRESSIONS — 4 sets, cycle every 30s ──
const CHORD_SETS = [
  // Each set: root + intervals. We build 2/3/4/5 note voicings dynamically
  [65.41,  77.78,  98.00,  116.54, 87.31],  // Cm  (low octave, cosmic)
  [73.42,  87.31,  110.00, 130.81, 97.99],  // Dm
  [82.41,  98.00,  123.47, 146.83, 110.00], // Em
  [55.00,  65.41,  82.41,  98.00,  73.42],  // Am  (darkest, most tense)
];
let CHORD_NOTES = CHORD_SETS[0];
let chordPhase = 0;
let lastMoveSound = 0;
let lastShootNote = 0;
let voicingSize = 2; // starts as duet, grows to 5 over time

// ── Slow, cosmic tone with reverb tail ──
function playTone(freq, vol, dur, type='sine', delay=0) {
  try {
    const o  = AC.createOscillator();
    const g  = AC.createGain();
    const lp = AC.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = freq * 3;
    o.connect(lp); lp.connect(g); g.connect(AC.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, AC.currentTime + delay);
    // Slow attack, long sustain, long release — cosmic pad feel
    g.gain.setValueAtTime(0, AC.currentTime + delay);
    g.gain.linearRampToValueAtTime(vol, AC.currentTime + delay + 0.4);   // 400ms attack
    g.gain.setValueAtTime(vol, AC.currentTime + delay + dur - 0.3);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + delay + dur + 1.2); // long tail
    o.start(AC.currentTime + delay);
    o.stop(AC.currentTime + delay + dur + 1.3);
  } catch(e) {}
}

// ── Sub-bass rumble layer ──
function playSubBass(freq, dur) {
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    const lp = AC.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 120;
    o.connect(lp); lp.connect(g); g.connect(AC.destination);
    o.type = 'sine';
    o.frequency.value = freq / 2;
    g.gain.setValueAtTime(0, AC.currentTime);
    g.gain.linearRampToValueAtTime(0.18, AC.currentTime + 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur + 0.8);
    o.start(); o.stop(AC.currentTime + dur + 1.0);
  } catch(e) {}
}

// ── Move chord: 2..5 notes, slow arpeggio, cosmic pad ──
function playMoveChord() {
  const size = Math.min(voicingSize, CHORD_NOTES.length);
  for (let i = 0; i < size; i++) {
    const note = CHORD_NOTES[(chordPhase + i) % CHORD_NOTES.length];
    const delay = i * 0.18; // slow stagger
    playTone(note, 0.07 / size * 2, 2.5, 'sine', delay);
    // Octave up — breathy layer
    if (i === 0) playTone(note * 2, 0.03, 2.0, 'triangle', delay + 0.1);
  }
  if (size >= 3) playSubBass(CHORD_NOTES[chordPhase % CHORD_NOTES.length], 2.5);
  chordPhase = (chordPhase + 1) % CHORD_NOTES.length;
}

// ── Shoot: slow laser sweep + harmonic overtone ──
function playShootSound(dirX, dirY) {
  const noteIdx = Math.abs(Math.round((Math.atan2(dirY, dirX) / Math.PI) * 2)) % CHORD_NOTES.length;
  const freq = CHORD_NOTES[noteIdx] * 2;
  // Slow pitch sweep down — cosmic laser
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    const lp = AC.createBiquadFilter();
    lp.type = 'bandpass'; lp.frequency.value = freq * 2; lp.Q.value = 3;
    o.connect(lp); lp.connect(g); g.connect(AC.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(freq * 1.5, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq * 0.7, AC.currentTime + 0.5);
    g.gain.setValueAtTime(0.14, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 0.6);
    o.start(); o.stop(AC.currentTime + 0.65);
  } catch(e) {}
  // Harmonic overtone — 5th above
  playTone(freq * 1.5, 0.04, 0.5, 'sine', 0.05);
}

// ── Drone shoot sound: tense, dissonant ──
function playDroneShootSound() {
  const noteIdx = Math.floor(Math.random() * CHORD_NOTES.length);
  const freq = CHORD_NOTES[noteIdx] * 1.5;
  // Tritone — tense interval
  playTone(freq, 0.06, 0.8, 'sine');
  playTone(freq * 1.414, 0.04, 1.0, 'triangle', 0.1); // tritone = √2
}

function playExplosionSound() {
  try {
    const buf  = AC.createBuffer(1, AC.sampleRate * 1.2, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++)
      data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 1.5);
    const src = AC.createBufferSource();
    const g   = AC.createGain();
    const lp  = AC.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 400;
    src.buffer = buf;
    src.connect(lp); lp.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0.6, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + 1.5);
    src.start();
    // Low boom
    playSubBass(55, 1.2);
  } catch(e) {}
}

function playExplosionSound() {
  try {
    const buf = AC.createBuffer(1, AC.sampleRate * 0.4, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
    const src = AC.createBufferSource();
    const g = AC.createGain();
    const f = AC.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 600;
    src.buffer = buf;
    src.connect(f); f.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0.5, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.4);
    src.start();
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
//  NEON RAY CANVAS — 2D overlay for laser beams
// ══════════════════════════════════════════════════════════
const rayCanvas = document.createElement('canvas');
rayCanvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:500;';
document.body.appendChild(rayCanvas);
const rayCtx = rayCanvas.getContext('2d');

function resizeRayCanvas() {
  rayCanvas.width  = window.innerWidth;
  rayCanvas.height = window.innerHeight;
}
resizeRayCanvas();
window.addEventListener('resize', resizeRayCanvas);

// ── Neon rays (lasers) ──
const rays = [];
let shootCooldown = 0;

function spawnRay(dx, dy) {
  const len = Math.hypot(dx, dy);
  if (len < 0.15) return;

  const ref = (mode === 'human') ? cg : ufoGroup;
  const vec = ref.position.clone().project(camera);
  const sx = (vec.x * 0.5 + 0.5) * rayCanvas.width;
  const sy = (-vec.y * 0.5 + 0.5) * rayCanvas.height;

  const col = (mode === 'ufo') ? '#00ffcc' : '#ff4400';
  const nx = dx / len, ny = dy / len;

  rays.push({
    x: sx, y: sy,
    vx: nx * 28, vy: ny * 28,
    col, len: 40, life: 1.0,
    worldDx: nx, worldDy: ny,
    srcX: ref.position.x, srcY: ref.position.y, srcZ: ref.position.z
  });
}

function drawRays(dt) {
  rayCtx.clearRect(0, 0, rayCanvas.width, rayCanvas.height);
  for (let i = rays.length - 1; i >= 0; i--) {
    const r = rays[i];
    r.x += r.vx; r.y += r.vy;
    r.life -= dt * 2.2;
    if (r.life <= 0) { rays.splice(i, 1); continue; }

    const alpha = r.life;
    const grd = rayCtx.createLinearGradient(r.x - r.vx*2, r.y - r.vy*2, r.x, r.y);
    grd.addColorStop(0, r.col + '00');
    grd.addColorStop(1, r.col + Math.floor(alpha*255).toString(16).padStart(2,'0'));

    rayCtx.save();
    rayCtx.globalAlpha = alpha;
    rayCtx.shadowColor = r.col;
    rayCtx.shadowBlur = 18;
    rayCtx.strokeStyle = grd;
    rayCtx.lineWidth = 3;
    rayCtx.lineCap = 'round';
    rayCtx.beginPath();
    rayCtx.moveTo(r.x - r.vx * 2.5, r.y - r.vy * 2.5);
    rayCtx.lineTo(r.x, r.y);
    rayCtx.stroke();

    // Bright core
    rayCtx.lineWidth = 1;
    rayCtx.strokeStyle = '#ffffff';
    rayCtx.shadowBlur = 4;
    rayCtx.beginPath();
    rayCtx.moveTo(r.x - r.vx * 1.2, r.y - r.vy * 1.2);
    rayCtx.lineTo(r.x, r.y);
    rayCtx.stroke();
    rayCtx.restore();
  }
}

// ══════════════════════════════════════════════════════════
//  DRONES — 3D enemies with high-poly mesh
// ══════════════════════════════════════════════════════════
const drones = [];
const DRONE_COLORS = [0xff2200, 0xff6600, 0xcc0044];

function buildDroneMesh() {
  const g = new THREE.Group();

  // Body — octahedron
  const bodyGeo = new THREE.OctahedronGeometry(0.6, 1);
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x1a1a2e, roughness: 0.3, metalness: 0.9,
    emissive: new THREE.Color(0xff2200), emissiveIntensity: 0.4
  });
  g.add(new THREE.Mesh(bodyGeo, bodyMat));

  // 4 arms
  for (let i = 0; i < 4; i++) {
    const ang = (i / 4) * Math.PI * 2;
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, 0.9, 6),
      new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.5, metalness: 0.8 })
    );
    arm.rotation.z = Math.PI / 2;
    arm.position.set(Math.cos(ang) * 0.5, 0, Math.sin(ang) * 0.5);
    arm.rotation.y = -ang;
    g.add(arm);

    // Rotor disc
    const rotor = new THREE.Mesh(
      new THREE.TorusGeometry(0.28, 0.04, 6, 16),
      new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0.7 })
    );
    rotor.position.set(Math.cos(ang) * 0.9, 0, Math.sin(ang) * 0.9);
    g.add(rotor);

    // Rotor glow
    const pl = new THREE.PointLight(0x00ccff, 1.2, 2);
    pl.position.copy(rotor.position);
    g.add(pl);
  }

  // Eye / sensor
  const eye = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );
  eye.position.y = -0.35;
  g.add(eye);
  const eyeLight = new THREE.PointLight(0xff0000, 2, 3);
  eyeLight.position.copy(eye.position);
  g.add(eyeLight);

  return g;
}

function spawnDrone() {
  const mesh = buildDroneMesh();
  // Always spawn near whichever entity exists
  const target = humanInsideUFO ? ufoGroup : (mode === 'ufo' ? ufoGroup : cg);

  // Spawn from random angle — all 4 sides + above
  const angle = Math.random() * Math.PI * 2;
  const dist  = 14 + Math.random() * 10;
  const fromAbove = Math.random() < 0.25; // 25% spawn from above

  mesh.position.set(
    target.position.x + Math.cos(angle) * dist,
    fromAbove ? target.position.y + 10 + Math.random() * 5 : 2 + Math.random() * 7,
    target.position.z + Math.sin(angle) * (dist * 0.3)
  );
  scene.add(mesh);
  drones.push({ mesh, hp: 3, spinY: 0, bobPhase: Math.random() * Math.PI * 2, alive: true });
}

function updateDrones(dt, t) {
  const ref = (mode === 'human') ? cg : ufoGroup;
  drones.forEach(d => {
    if (!d.alive) return;
    // Bob + spin
    d.spinY += dt * 1.5;
    d.mesh.rotation.y = d.spinY;
    d.mesh.position.y += Math.sin(t * 2 + d.bobPhase) * dt * 0.8;
    // Chase player slowly
    const dx = ref.position.x - d.mesh.position.x;
    d.mesh.position.x += dx * dt * 0.25;
    d.mesh.position.z += (ref.position.z - d.mesh.position.z) * dt * 0.2;
  });
}

// ── Drone hit detection vs rays ──
function checkRayDroneCollisions() {
  for (let ri = rays.length - 1; ri >= 0; ri--) {
    const r = rays[ri];
    for (let di = drones.length - 1; di >= 0; di--) {
      const d = drones[di];
      if (!d.alive) continue;
      // Project drone to screen and check proximity to ray tip
      const vec = d.mesh.position.clone().project(camera);
      const sx = (vec.x * 0.5 + 0.5) * rayCanvas.width;
      const sy = (-vec.y * 0.5 + 0.5) * rayCanvas.height;
      const dist = Math.hypot(r.x - sx, r.y - sy);
      if (dist < 40) {
        d.hp--;
        rays.splice(ri, 1);
        if (d.hp <= 0) killDrone(di);
        break;
      }
    }
  }
}

// ══════════════════════════════════════════════════════════
//  3D EXPLOSION
// ══════════════════════════════════════════════════════════
const explosions = [];

function killDrone(idx) {
  const d = drones[idx];
  d.alive = false;
  playExplosionSound();

  // Particle burst
  const pos = d.mesh.position.clone();
  scene.remove(d.mesh);

  const particles = [];
  const cols = [0xff4400, 0xffaa00, 0xff0000, 0xffff00, 0xffffff];
  for (let i = 0; i < 22; i++) {
    const geo = new THREE.IcosahedronGeometry(0.08 + Math.random() * 0.18, 1);
    const mat = new THREE.MeshBasicMaterial({ color: cols[i % cols.length] });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    const spd = 3 + Math.random() * 6;
    const ang = Math.random() * Math.PI * 2;
    const elev = (Math.random() - 0.5) * Math.PI;
    mesh.userData.vx = Math.cos(ang) * Math.cos(elev) * spd;
    mesh.userData.vy = Math.sin(elev) * spd + 2;
    mesh.userData.vz = Math.sin(ang) * Math.cos(elev) * spd;
    scene.add(mesh);
    particles.push(mesh);
  }

  // Flash light
  const flash = new THREE.PointLight(0xff6600, 12, 10);
  flash.position.copy(pos);
  scene.add(flash);

  // Ring shockwave
  const ringGeo = new THREE.TorusGeometry(0.1, 0.08, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 1, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);

  explosions.push({ particles, flash, ring, ringMat, life: 1.0 });
  drones.splice(idx, 1);
}

function updateExplosions(dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.life -= dt * 1.4;
    ex.flash.intensity = ex.life * 10;
    ex.ring.scale.setScalar(1 + (1 - ex.life) * 8);
    ex.ringMat.opacity = ex.life;
    ex.particles.forEach(p => {
      p.position.x += p.userData.vx * dt;
      p.position.y += p.userData.vy * dt;
      p.position.z += p.userData.vz * dt;
      p.userData.vy -= 9 * dt;
      p.scale.setScalar(ex.life);
    });
    if (ex.life <= 0) {
      ex.particles.forEach(p => scene.remove(p));
      scene.remove(ex.flash);
      scene.remove(ex.ring);
      explosions.splice(i, 1);
    }
  }
}

// ── DIFFICULTY ESCALATION ──
let gameTime = 0;
let difficulty = 0;
let droneSpawnTimer = 4;
let chordSetTimer   = 0;
let droneAttackTimer = {};

// ═══════════════════════════════════════════
//  GAME STATE — life / fuel / weapon
// ═══════════════════════════════════════════
const state = { life: 1.0, fuel: 1.0, weapon: 0.6, dead: false };

function updateHUD() {
  document.getElementById('bar-life').style.width   = Math.max(0,state.life)*100 + '%';
  document.getElementById('bar-fuel').style.width   = Math.max(0,state.fuel)*100 + '%';
  document.getElementById('bar-weapon').style.width = Math.max(0,state.weapon)*100 + '%';
}

function triggerGameOver() {
  if (state.dead) return;
  state.dead = true;
  hVel.y = -8;
  document.getElementById('gameover').style.display = 'flex';
}

function restartGame() {
  state.life=1; state.fuel=1; state.weapon=0.6; state.dead=false;
  cg.position.set(0,0,0); ufoGroup.position.set(8,10,2);
  hVel.set(0,0,0); onGround=true;
  mode='human'; humanInsideUFO=false; cg.visible=true;
  drones.forEach(d=>scene.remove(d.mesh)); drones.length=0;
  pickups.forEach(p=>scene.remove(p.mesh)); pickups.length=0;
  gameTime=0; difficulty=0; pickupSpawnTimer=3;
  document.getElementById('gameover').style.display='none';
  document.getElementById('ui').textContent='◈ NEON DISTRICT ◈';
  updateHUD();
}

// ═══════════════════════════════════════════
//  PICKUPS — glowing L / F / W in 3D space
// ═══════════════════════════════════════════
const pickups = [];
const PICKUP_DEFS = [
  { char:'L', color:0xff2244, emissive:0xff0033 },
  { char:'F', color:0x00ccff, emissive:0x0088ff },
  { char:'W', color:0xffaa00, emissive:0xff8800 },
];

function spawnPickup() {
  const def  = PICKUP_DEFS[Math.floor(Math.random()*3)];
  const ref  = cg;
  const zone = Math.random();
  let px, py;
  if (zone < 0.5)      { px = ref.position.x+(Math.random()-.5)*80; py = 0.8+Math.random()*0.5; }
  else if (zone < 0.8) { px = ref.position.x+(Math.random()-.5)*60; py = 10+Math.random()*20; }
  else                  { px = ref.position.x+(Math.random()-.5)*40; py = 35+Math.random()*50; }

  const geo = new THREE.BoxGeometry(1.1,1.1,0.25);
  const mat = new THREE.MeshStandardMaterial({
    color:def.color, emissive:new THREE.Color(def.emissive),
    emissiveIntensity:1.4, roughness:0.2, metalness:0.5
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(px, py, 0);
  const pl = new THREE.PointLight(def.color, 3, 6); mesh.add(pl);

  // Letter canvas
  const sc=document.createElement('canvas'); sc.width=64; sc.height=64;
  const sx=sc.getContext('2d');
  sx.fillStyle=`#${def.color.toString(16).padStart(6,'0')}`;
  sx.font='bold 48px monospace'; sx.textAlign='center'; sx.textBaseline='middle';
  sx.fillText(def.char,32,34);
  const sprite=new THREE.Mesh(
    new THREE.PlaneGeometry(0.85,0.85),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(sc),transparent:true,side:THREE.DoubleSide})
  );
  mesh.add(sprite);
  scene.add(mesh);
  pickups.push({mesh, char:def.char, bobPhase:Math.random()*Math.PI*2});
}

function applyPickup(char) {
  if (char==='L') { state.life  =Math.min(1,state.life  +0.3); playTone(196,0.1,1.5,'sine'); }
  if (char==='F') { state.fuel  =Math.min(1,state.fuel  +0.35); playTone(261,0.1,1.5,'sine'); }
  if (char==='W') { state.weapon=Math.min(1,state.weapon+0.4);  playTone(330,0.1,1.5,'sine'); }
  updateHUD();
}

function updatePickups(dt, t) {
  for (let i=pickups.length-1; i>=0; i--) {
    const p = pickups[i];
    p.mesh.position.y += Math.sin(t*1.8+p.bobPhase)*dt*0.35;
    p.mesh.rotation.y += dt*1.2;
    // Check human
    if (p.mesh.position.distanceTo(cg.position) < 2.0) {
      applyPickup(p.char); scene.remove(p.mesh); pickups.splice(i,1); continue;
    }
    // Check UFO
    if (p.mesh.position.distanceTo(ufoGroup.position) < 3.0) {
      applyPickup(p.char); scene.remove(p.mesh); pickups.splice(i,1); continue;
    }
  }
}

let pickupSpawnTimer = 3;

// Drone shoots a ray at the player
function droneShoot(drone) {
  // Always target whichever entity is active (human OR ufo)
  const target = humanInsideUFO ? ufoGroup : (mode === 'ufo' ? ufoGroup : cg);

  const vec  = drone.mesh.position.clone().project(camera);
  const sx   = (vec.x * 0.5 + 0.5) * rayCanvas.width;
  const sy   = (-vec.y * 0.5 + 0.5) * rayCanvas.height;

  const tvec = target.position.clone().project(camera);
  const tx   = (tvec.x * 0.5 + 0.5) * rayCanvas.width;
  const ty   = (-tvec.y * 0.5 + 0.5) * rayCanvas.height;

  const sdx = tx - sx, sdy = ty - sy;
  const sl  = Math.hypot(sdx, sdy) || 1;

  rays.push({
    x: sx, y: sy,
    vx: (sdx/sl) * 20, vy: (sdy/sl) * 20,
    col: '#ff0055', life: 1.0,
    isDroneShot: true
  });

  playDroneShootSound();
}

animate();
window.addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
